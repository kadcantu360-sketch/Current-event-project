<!DOCTYPE html>
<html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Syrian War Game</title>

    <style>
        body {
            font-family: 'Times New Roman', sans-serif;
            background-color: #f0f0f0;
            margin: 25px;
        }

        h1 {
            color: #333;
            text-align: center;
            font-size: 55px;
        }

        p {
            color: #666;
            font-size: 25px;
        }

        .button {
            padding: 10px 20px;
            margin: 20px;
            font-size: 30px;
            background-color: #4CAF50;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            color: #eeeeee;
            transition: background-color 0.2s ease;
        }
        .button:hover {
            background-color: #5ec963;
        }
        .button:active {
            background-color: #3e8e41;
        }
        .buttondiv {
            text-align: center;
        }

    </style>
</head>

<body>
    <h1>Syrian War</h1>

    <p>Game Over!</p>

    <p id="reason">why you lost</p>

    <div class="buttondiv">
        <a class="button" id="button2">Try Again</a>
    </div>

    <script src="script.js"></script>

</body>

</html>
